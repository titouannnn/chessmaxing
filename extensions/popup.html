<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <style>
        :root {
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --text-main: #1e293b;
            --text-muted: #64748b;
        }

        body {
            width: 320px; /* Largeur standard extension */
            margin: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            background: var(--card-bg);
            padding: 24px;
            border-radius: 16px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            text-align: center;
        }

        h3 {
            margin: 0 0 8px 0;
            font-size: 1.25rem;
            font-weight: 600;
            letter-spacing: -0.025em;
        }

        p {
            font-size: 0.9rem;
            color: var(--text-muted);
            margin-bottom: 20px;
        }

        .logo {
            width: 48px;
            height: 48px;
            margin-bottom: 16px;
            border-radius: 12px;
        }

        #btn {
            width: 100%;
            padding: 12px 20px;
            font-size: 0.95rem;
            font-weight: 500;
            color: white;
            background-color: var(--primary);
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 6px -1px rgba(99, 102, 241, 0.2);
        }

        #btn:hover {
            background-color: var(--primary-hover);
            transform: translateY(-1px);
            box-shadow: 0 6px 8px -1px rgba(99, 102, 241, 0.3);
        }

        #btn:active {
            transform: translateY(0);
        }
    </style>
</head>
<body>

    <div class="container">
        <img src="logo.png" alt="Logo" class="logo">
        <h3>Export to Chessmaxing</h3>
        
        <button id="btn">Export Game</button>
        <div id="status-message" style="margin-top: 15px; font-size: 0.85rem; color: #a3b5af; font-weight: 500;">
            Nothing exported yet.
        </div>
    </div>
    

    <script src="popup.js"></script>
</body>
</html>
